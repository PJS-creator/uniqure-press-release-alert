name: Watch AllAsset (반팔)

on:
  workflow_dispatch:

concurrency:
  group: allasset-watch
  cancel-in-progress: true

permissions:
  contents: write
  issues: write

jobs:
  allasset-watch:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run AllAsset watcher
        env:
          DC_COOKIE: ${{ secrets.DC_COOKIE }}  # 중요: 세션 쿠키 정보
          ALERT_TO: "PJS-creator"
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: |
          python watch_allasset_banpal.py

      - name: Commit state if changed
        run: |
          if git diff --quiet; then
            echo "No state change."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add state_allasset_banpal.json
          git commit -m "Update last seen for AllAsset Banpal"
          git push
